services:
  autostr:
    build: .
    image: autostr:latest
    volumes:
      - ./models:/models
      - ./input:/input
      - ./output:/output
    environment:
      - MODEL_DIR=/models
      - HF_HOME=/models/huggingface
      - XDG_CACHE_HOME=/models/cache
      - WHISPER_DEVICE=cpu
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_MODEL=small
      - START_DELAY_MS=150
    command: ["--input", "/input/test.mp4", "--output", "/output/test.srt"]